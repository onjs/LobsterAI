name: lobster-mem0-stack

services:
  mem0:
    image: mem0/mem0-api-server:latest
    container_name: lobster-mem0
    restart: unless-stopped
    ports:
      - '8888:8000'
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-${MINIMAX_API_KEY:-}}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-${MINIMAX_API_BASE:-}}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_COLLECTION_NAME=memories
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=mem0graph
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - mem0_network

  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: lobster-mem0-postgres
    restart: unless-stopped
    shm_size: '128mb'
    ports:
      - '8432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', 'postgres', '-U', 'postgres']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_db:/var/lib/postgresql/data
    networks:
      - mem0_network

  neo4j:
    image: neo4j:5.26.4
    container_name: lobster-mem0-neo4j
    restart: unless-stopped
    ports:
      - '8474:7474'
      - '8687:7687'
    environment:
      - NEO4J_AUTH=neo4j/mem0graph
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:7474']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - mem0_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lobster-mem0-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mem0_network

volumes:
  postgres_db:
  neo4j_data:
  qdrant_data:

networks:
  mem0_network:
    driver: bridge
